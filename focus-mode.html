<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode - Student Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>
    <nav class="sidebar" id="sidebar">
        <h2></h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="news.html">News</a></li>
            <li><a href="student-portal.html">Student Portal</a></li>
            <li><a href="resources.html">Resources</a></li>
            <li><a href="stress-release.html">Stress Release</a></li>
        </ul>
        <button id="themeToggle" class="theme-toggle-btn">🌙 Dark Mode</button>
    </nav>

    <main id="main">
        <section class="focus-page-section">
            <div class="focus-layout">
                <!-- Timer Section -->
                <div class="timer-section">
                    <h2 class="focus-title">Focus Timer</h2>
                    <div class="timer-display">
                        <span id="minutes">25</span>:<span id="seconds">00</span>
                    </div>
                    <div class="timer-controls">
                        <button id="startTimer" class="timer-btn">Start</button>
                        <button id="pauseTimer" class="timer-btn">Pause</button>
                        <button id="resetTimer" class="timer-btn">Reset</button>
                    </div>
                    <div class="timer-modes">
                        <button class="mode-btn active" data-time="25">Focus</button>
                        <button class="mode-btn" data-time="5">Short Break</button>
                        <button class="mode-btn" data-time="15">Long Break</button>
                    </div>
                </div>

                <!-- Music Player Section (Oto Style) -->
                <div class="music-player-section">
                    <div class="oto-player">
                        <div class="player-header">
                            <span>Now Playing</span>
                        </div>
                        <div class="album-art-container">
                            <img id="currentCover" src="https://images.unsplash.com/photo-1494232410401-ad00d5433cfa?w=300&h=300&fit=crop" alt="Album Art">
                        </div>
                        <div class="track-info">
                            <h3 id="trackTitle">White Noise - Rain</h3>
                            <p id="trackArtist">Ambient Sounds</p>
                        </div>
                        <div class="player-controls">
                            <button id="prevTrack" class="control-btn">⏮</button>
                            <button id="playPauseTrack" class="control-btn play-btn">▶</button>
                            <button id="nextTrack" class="control-btn">⏭</button>
                        </div>
                        <div class="volume-container">
                            <span>🔈</span>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
                            <span>🔊</span>
                        </div>
                        <div class="noise-options">
                            <button class="noise-btn active" data-sound="https://actions.google.com/sounds/v1/water/rain_on_roof.ogg" data-title="Rainfall" data-cover="https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?w=300&h=300&fit=crop">🌧️ Rain</button>
                            <button class="noise-btn" data-sound="https://actions.google.com/sounds/v1/ambiences/forest_ambience.ogg" data-title="Deep Forest" data-cover="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300&h=300&fit=crop">🌲 Forest</button>
                            <button class="noise-btn" data-sound="https://actions.google.com/sounds/v1/water/waves_crashing_on_shore.ogg" data-title="Ocean Waves" data-cover="https://images.unsplash.com/photo-1505118380757-91f5f45d8de0?w=300&h=300&fit=crop">🌊 Waves</button>
                            <button class="noise-btn" data-sound="https://actions.google.com/sounds/v1/ambiences/coffee_shop.ogg" data-title="Coffee Shop" data-cover="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&h=300&fit=crop">☕ Cafe</button>
                        </div>
                        <div class="custom-music">
                            <input type="file" id="musicUpload" accept="audio/*" hidden>
                            <button id="uploadBtn" class="upload-btn">➕ Add Your Music</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Audio element for player -->
    <audio id="focusAudio" loop></audio>

    <script src="script.js"></script>
    <script src="focus-mode.js"></script>
</body>
</html>
