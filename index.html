<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Student Portal</h1>
        <nav>
            <button id="unit-conversions-tab" class="tab active">Unit Conversions</button>
            <button id="exam-countdown-tab" class="tab">Exam Countdown & Study Timers</button>
            <button id="other-tools-tab" class="tab">Other Tools</button>
        </nav>
    </header>

    <main>
        <section id="unit-conversions" class="tab-content active">
            <h2>Unit Conversions</h2>
            <div class="converter">
                <select id="category">
                    <option value="length">Length</option>
                    <option value="weight">Weight</option>
                    <option value="temperature">Temperature</option>
                    <option value="volume">Volume</option>
                </select>
                <input type="number" id="input-value" placeholder="Enter value">
                <select id="from-unit"></select>
                <span>to</span>
                <select id="to-unit"></select>
                <button id="convert-btn">Convert</button>
                <div id="result"></div>
            </div>
        </section>

        <section id="exam-countdown" class="tab-content">
            <h2>Exam Countdown & Study Timers</h2>
            <div class="exam-countdown">
                <h3>Exam Countdown</h3>
                <input type="datetime-local" id="exam-date">
                <button id="set-countdown">Set Countdown</button>
                <div id="countdown-display"></div>
            </div>
            <div class="study-timer">
                <h3>Study Timer (Pomodoro)</h3>
                <div id="timer-display">25:00</div>
                <button id="start-timer">Start</button>
                <button id="pause-timer">Pause</button>
                <button id="reset-timer">Reset</button>
                <p>Work: 25 min, Break: 5 min</p>
            </div>
        </section>

        <section id="other-tools" class="tab-content">
            <h2>Other Tools</h2>
            <div class="gpa-calculator">
                <h3>GPA Calculator</h3>
                <div id="courses">
                    <div class="course">
                        <input type="text" placeholder="Course Name" class="course-name">
                        <input type="number" placeholder="Credits" class="credits" min="1">
                        <select class="grade">
                            <option value="4.0">A</option>
                            <option value="3.7">A-</option>
                            <option value="3.3">B+</option>
                            <option value="3.0">B</option>
                            <option value="2.7">B-</option>
                            <option value="2.3">C+</option>
                            <option value="2.0">C</option>
                            <option value="1.7">C-</option>
                            <option value="1.3">D+</option>
                            <option value="1.0">D</option>
                            <option value="0.0">F</option>
                        </select>
                    </div>
                </div>
                <button id="add-course">Add Course</button>
                <button id="calculate-gpa">Calculate GPA</button>
                <div id="gpa-result"></div>
            </div>
            <div class="note-taker">
                <h3>Quick Notes</h3>
                <textarea id="notes" placeholder="Write your notes here..."></textarea>
                <button id="save-notes">Save Notes</button>
                <div id="saved-notes"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
