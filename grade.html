<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Transcript - Student Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="linear.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="news.html">News</a>
            <a href="student-portal.html">Student Portal</a>
            <a href="resources.html">Resources</a>
            <a href="stress-release.html">Stress Release</a>
        </div>
        <button id="themeToggle" class="nav-theme-toggle">🌙 Dark Mode</button>
    </nav>
    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="auth-modal-content">
            <button class="close-btn" id="closeAuth">&times;</button>
            <div class="auth-tabs">
                <button class="auth-tab-btn active" data-tab="login">Sign In</button>
                <button class="auth-tab-btn" data-tab="signup">Sign Up</button>
            </div>
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <h2>Sign In</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form">
                <h2>Create Account</h2>
                <input type="text" id="signupName" placeholder="Full Name" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <input type="password" id="signupConfirm" placeholder="Confirm Password" required>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
        </div>
    </div>
    <!-- Profile Button -->
    <button id="profileBtn" class="profile-btn">👤 Login</button>
    <!-- Profile Dropdown Menu -->
    <div id="profileMenu" class="profile-menu">
        <div class="profile-menu-header">
            <p id="profileMenuName">User Name</p>
            <p id="profileMenuEmail" class="menu-email"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="572224322517323a363e3b7934383a">[email&#160;protected]</a></p>
        </div>
        <button id="viewDetailsBtn" class="profile-menu-option">📋 View Account Details</button>
        <button id="logoutBtn" class="profile-menu-option logout-option">🚪 Logout</button>
    </div>
    <!-- Account Details Modal -->
    <div id="accountModal" class="auth-modal">
        <div class="auth-modal-content">
            <button class="close-btn" id="closeAccount">&times;</button>
            <h2>Account Details</h2>
            <div class="account-details">
                <p><strong>Name:</strong> <span id="detailsName">-</span></p>
                <p><strong>Email:</strong> <span id="detailsEmail">-</span></p>
                <p><strong>Member Since:</strong> <span id="detailsDate">-</span></p>
            </div>
        </div>
    </div>
    <main id="main">
        <section>
            <div style="margin-bottom:1.5rem">
                <span class="page-label">Academic Performance</span>
            </div>
            <div class="header-flex">
                <div>
                    <h1>Academic Transcript</h1>
                    <p>Real-time performance tracking</p>
                </div>
                <div class="gpa-card">
                    <div>Current GPA</div>
                    <div id="gpa-val">0.00</div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Module Name</th>
                        <th>Level</th>
                        <th>Score</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody id="grades-body">
                </tbody>
            </table>

            <div style="margin-top: 30px; text-align: right;">
                <button class="clear-btn" onclick="clearGrades()">Reset All Records</button>
            </div>
        </section>
    </main>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="script.js"></script>
    <script>
        function loadGrades() {
            const tbody = document.getElementById('grades-body');
            const modules = [
                { id: 'easy_0', name: 'Intro to Python', lvl: '100' },
                { id: 'easy_1', name: 'HTML & CSS', lvl: '100' },
                { id: 'medium_0', name: 'Data Structures', lvl: '200' },
                { id: 'hard_0', name: 'Algorithms (Big O)', lvl: '400' }
            ];

            let totalPoints = 0;
            let attemptedCount = 0;
            tbody.innerHTML = '';

            modules.forEach(m => {
                const score = localStorage.getItem(`quiz_${m.id}`);
                if (score !== null) {
                    const val = parseInt(score);
                    const gradeInfo = getGrade(val);
                    totalPoints += gradeInfo.points;
                    attemptedCount++;

                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 500;">${m.name}</td>
                            <td>Level ${m.lvl}</td>
                            <td>${val} / 10</td>
                            <td><span class="grade-badge ${gradeInfo.class}">${gradeInfo.letter}</span></td>
                        </tr>
                    `;
                }
            });

            if (attemptedCount === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px;">No quiz records found. Go take a quiz!</td></tr>';
            } else {
                const gpa = (totalPoints / attemptedCount).toFixed(2);
                document.getElementById('gpa-val').innerText = gpa;
            }
        }

        function getGrade(score) {
            if (score >= 9) return { letter: 'A+', points: 4.0, class: 'grade-high' };
            if (score >= 7) return { letter: 'B', points: 3.0, class: 'grade-high' };
            if (score >= 5) return { letter: 'C', points: 2.0, class: 'grade-med' };
            return { letter: 'F', points: 0.0, class: 'grade-low' };
        }

        function clearGrades() {
            if(confirm("Are you sure you want to clear all records?")) {
                const modules = ['easy_0', 'easy_1', 'medium_0', 'hard_0'];
                modules.forEach(id => localStorage.removeItem(`quiz_${id}`));
                location.reload();
            }
        }
        window.onload = loadGrades;
    </script>
</body>
</html>
