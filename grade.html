<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Academic Records</title>
    <style>
        :root {
            --bg-body: #1a1625;
            --bg-sidebar: #2d2438;
            --bg-card: #362f47;
            --text-main: #ffffff;
            --text-dim: #b9b2c7;
            --accent: #a855f7;
            --btn-blue: #38bdf8;
            --border-gold: #f59e0b;
            --success: #22c55e;
        }

        .light-mode {
            --bg-body: #f3f4f6;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-dim: #4b5563;
            --accent: #8b5cf6;
            --btn-blue: #0284c7;
            --border-gold: #d97706;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        nav {
            width: 240px;
            background: var(--bg-sidebar);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-dim);
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-item.active { background: var(--accent); color: white; }

        main { flex-grow: 1; padding: 40px; display: flex; justify-content: center; }

        .content-container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 30px;
            border-top: 4px solid var(--border-gold);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .gpa-card {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--accent);
        }

        .light-mode .gpa-card { background: #f9fafb; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            color: var(--border-gold);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding: 12px;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text-dim);
        }

        .light-mode td { border-bottom-color: #e5e7eb; }

        .grade-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .grade-high { background: #166534; color: #bbf7d0; }
        .grade-med { background: #854d0e; color: #fef9c3; }
        .grade-low { background: #991b1b; color: #fee2e2; }

        .clear-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .clear-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 30px; color: var(--accent);">X</div>
    <a href="#" class="nav-item">Home</a>
    <a href="#" class="nav-item active">Grades</a>
    <a href="#" class="nav-item">Quizzes</a>
    <button onclick="document.body.classList.toggle('light-mode')" style="margin-top: auto; padding: 10px; cursor: pointer;">🌓 Switch Theme</button>
</nav>

<main>
    <div class="content-container">
        <div class="header-flex">
            <div>
                <h1 style="margin:0;">Academic Transcript</h1>
                <p style="color: var(--text-dim);">Real-time performance tracking</p>
            </div>
            <div class="gpa-card">
                <div style="font-size: 0.8rem; text-transform: uppercase; color: var(--accent);">Current GPA</div>
                <div id="gpa-val" style="font-size: 2rem; font-weight: 800;">0.00</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Module Name</th>
                    <th>Level</th>
                    <th>Score</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody id="grades-body">
                </tbody>
        </table>

        <div style="margin-top: 30px; text-align: right;">
            <button class="clear-btn" onclick="clearGrades()">Reset All Records</button>
        </div>
    </div>
</main>

<script>
    // In a real app, your Quiz page would call: 
    // localStorage.setItem('CS_Quiz_Python', 9);

    function loadGrades() {
        const tbody = document.getElementById('grades-body');
        const modules = [
            { id: 'easy_0', name: 'Intro to Python', lvl: '100' },
            { id: 'easy_1', name: 'HTML & CSS', lvl: '100' },
            { id: 'medium_0', name: 'Data Structures', lvl: '200' },
            { id: 'hard_0', name: 'Algorithms (Big O)', lvl: '400' }
        ];

        let totalPoints = 0;
        let attemptedCount = 0;
        tbody.innerHTML = '';

        modules.forEach(m => {
            const score = localStorage.getItem(`quiz_${m.id}`);
            if (score !== null) {
                const val = parseInt(score);
                const gradeInfo = getGrade(val);
                totalPoints += gradeInfo.points;
                attemptedCount++;

                tbody.innerHTML += `
                    <tr>
                        <td style="color: var(--text-main); font-weight: 500;">${m.name}</td>
                        <td>Level ${m.lvl}</td>
                        <td>${val} / 10</td>
                        <td><span class="grade-badge ${gradeInfo.class}">${gradeInfo.letter}</span></td>
                    </tr>
                `;
            }
        });

        if (attemptedCount === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px;">No quiz records found. Go take a quiz!</td></tr>';
        } else {
            const gpa = (totalPoints / attemptedCount).toFixed(2);
            document.getElementById('gpa-val').innerText = gpa;
        }
    }

    function getGrade(score) {
        if (score >= 9) return { letter: 'A+', points: 4.0, class: 'grade-high' };
        if (score >= 7) return { letter: 'B', points: 3.0, class: 'grade-high' };
        if (score >= 5) return { letter: 'C', points: 2.0, class: 'grade-med' };
        return { letter: 'F', points: 0.0, class: 'grade-low' };
    }

    function clearGrades() {
        if(confirm("Are you sure you want to delete all academic records?")) {
            localStorage.clear();
            loadGrades();
        }
    }

    window.onload = loadGrades;
</script>
</body>
</html>
