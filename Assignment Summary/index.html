<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Summarizer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
    <header>
        <h1>Assignment Summarizer</h1>
        <p>Upload your assignment PDF to get a summarized overview of deadlines, tasks, and key details.</p>
    </header>

    <main>
        <section id="upload-section">
            <h2>Upload PDF</h2>
            <input type="file" id="pdf-file" accept=".pdf">
            <button id="process-btn">Process Assignment</button>
        </section>

        <section id="summary-section" style="display: none;">
            <h2>Assignment Summary</h2>
            <div id="summary-content">
                <h3>Deadlines</h3>
                <ul id="deadlines-list"></ul>

                <h3>Tasks</h3>
                <ul id="tasks-list"></ul>

                <h3>Other Key Details</h3>
                <ul id="details-list"></ul>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
