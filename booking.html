<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session | UniKuppi</title>
    <style>
        :root { --primary: #2563eb; --light: #f1f5f9; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 5%; line-height: 1.6; }
        
        .container { max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary); }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← Back to Dashboard</a>
    <h2>Book Your Kuppi Session</h2>
    
    
    
    <form>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label>Select Module</label>
            <select>
                <option>Computer Science</option>
                <option>Engineering</option>
                <option>Management</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Preferred Date & Time</label>
            <input type="datetime-local">
        </div>
        
        <div class="form-group">
            <label>Notes for Tutor</label>
            <textarea rows="4" placeholder="What specific topic do you need help with?"></textarea>
        </div>
        
        <button type="submit" class="btn-submit">Confirm Booking</button>
    </form>
</div>

</body>
</html>
