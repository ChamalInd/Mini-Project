<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session - Cyber Piyasa</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="linear.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-tabs">
            <a href="index.html">Home</a>
            <a href="news.html">News</a>
            <a href="student-portal.html">Student Portal</a>
            <a href="resources.html">Resources</a>
            <a href="stress-release.html">Stress Release</a>
        </div>
        <button id="themeToggle" class="nav-theme-toggle">🌙 Dark Mode</button>
    </nav>
    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="auth-modal-content">
            <button class="close-btn" id="closeAuth">&times;</button>
            <div class="auth-tabs">
                <button class="auth-tab-btn active" data-tab="login">Sign In</button>
                <button class="auth-tab-btn" data-tab="signup">Sign Up</button>
            </div>
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <h2>Sign In</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form">
                <h2>Create Account</h2>
                <input type="text" id="signupName" placeholder="Full Name" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <input type="password" id="signupConfirm" placeholder="Confirm Password" required>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
        </div>
    </div>
    <!-- Profile Button -->
    <button id="profileBtn" class="profile-btn">👤 Login</button>
    <!-- Profile Dropdown Menu -->
    <div id="profileMenu" class="profile-menu">
        <div class="profile-menu-header">
            <p id="profileMenuName">User Name</p>
            <p id="profileMenuEmail" class="menu-email"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="8afff9eff8caefe7ebe3e6a4e9e5e7">[email&#160;protected]</a></p>
        </div>
        <button id="viewDetailsBtn" class="profile-menu-option">📋 View Account Details</button>
        <button id="logoutBtn" class="profile-menu-option logout-option">🚪 Logout</button>
    </div>
    <!-- Account Details Modal -->
    <div id="accountModal" class="auth-modal">
        <div class="auth-modal-content">
            <button class="close-btn" id="closeAccount">&times;</button>
            <h2>Account Details</h2>
            <div class="account-details">
                <p><strong>Name:</strong> <span id="detailsName">-</span></p>
                <p><strong>Email:</strong> <span id="detailsEmail">-</span></p>
                <p><strong>Member Since:</strong> <span id="detailsDate">-</span></p>
            </div>
        </div>
    </div>

    <main id="main">
        <section class="booking-container" style="background:transparent!important;border:none!important;backdrop-filter:none!important;box-shadow:none!important;">
            <div style="margin-bottom:2rem">
                <span class="page-label">Kuppi</span>
                <h2 class="page-heading" style="border:none;padding:0;margin-bottom:0.3rem">Book a Session</h2>
            </div>
            <div class="booking-form">
                <a href="kuppi.html" class="overview-link" style="margin-bottom: 2rem;">← Back to Kuppi</a>
                <h2>Book Your Kuppi Session</h2>
                <form id="sessionBookingForm">
                    <div class="input-box">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </div>
                    
                    <div class="input-box">
                        <label>Select Module</label>
                        <select required>
                            <option value="">Choose a module...</option>
                            <option>Computer Science</option>
                            <option>Engineering</option>
                            <option>Management</option>
                        </select>
                    </div>
                    
                    <div class="input-box">
                        <label>Preferred Date & Time</label>
                        <input type="datetime-local" required>
                    </div>
                    
                    <div class="input-box">
                        <label>Notes for Tutor</label>
                        <textarea rows="4" placeholder="What specific topic do you need help with?" style="padding: 10px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text-color);"></textarea>
                    </div>
                    
                    <button type="submit" class="action-btn" style="width: 100%;">Confirm Booking</button>
                </form>
            </div>
            </div>
        </section>
    </main>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="script.js"></script>
    <script>
        document.getElementById('sessionBookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Booking successful!');
            window.location.href = 'kuppi.html';
        });
    </script>
</body>
</html>
