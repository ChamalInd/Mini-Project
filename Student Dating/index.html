<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect - Student Dating</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-container" class="container">
        <h1>Welcome to CampusConnect</h1>
        <p>Find your perfect study partner or more. Connect with students today!</p>
        <form id="login-form">
            <div class="form-group">
                <label for="student-id">Name or Username:</label>
                <input type="text" id="student-id" placeholder="Enter your name or any username">
            </div>
            <button type="submit" id="login-btn">Enter</button>
        </form>
        <p class="note">Join our community of students looking to connect!</p>
    </div>

    <div id="app-container" class="container hidden">
        <header>
            <h1>CampusConnect</h1>
            <button id="logout-btn">Logout</button>
        </header>
        <nav>
            <button class="nav-btn active" data-section="profile">My Profile</button>
            <button class="nav-btn" data-section="discover">Discover</button>
            <button class="nav-btn" data-section="matches">Matches</button>
            <button class="nav-btn" data-section="messages">Messages</button>
        </nav>
        <main>
            <section id="profile-section" class="section active">
                <h2>My Profile</h2>
                <form id="profile-form">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" min="18" max="30" required>
                    </div>
                    <div class="form-group">
                        <label for="major">Major:</label>
                        <input type="text" id="major" required>
                    </div>
                    <div class="form-group">
                        <label for="year">Year:</label>
                        <select id="year" required>
                            <option value="">Select Year</option>
                            <option value="Freshman">Freshman</option>
                            <option value="Sophomore">Sophomore</option>
                            <option value="Junior">Junior</option>
                            <option value="Senior">Senior</option>
                            <option value="Graduate">Graduate</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="interests">Interests:</label>
                        <textarea id="interests" placeholder="e.g., studying, gaming, sports, music"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="bio">Bio:</label>
                        <textarea id="bio" placeholder="Tell others about yourself"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="looking-for">Looking For:</label>
                        <select id="looking-for">
                            <option value="study-partner">Study Partner</option>
                            <option value="friendship">Friendship</option>
                            <option value="dating">Dating</option>
                            <option value="both">Both</option>
                        </select>
                    </div>
                    <button type="submit">Save Profile</button>
                </form>
            </section>

            <section id="discover-section" class="section">
                <h2>Discover Students</h2>
                <div id="discover-container">
                    <div id="student-card" class="student-card hidden">
                        <div id="student-info"></div>
                        <div class="card-actions">
                            <button id="pass-btn" class="action-btn pass-btn">Pass</button>
                            <button id="like-btn" class="action-btn like-btn">Like</button>
                        </div>
                    </div>
                    <div id="no-more-cards" class="hidden">
                        <p>No more students to show right now. Check back later!</p>
                    </div>
                </div>
            </section>

            <section id="matches-section" class="section">
                <h2>Your Matches</h2>
                <div id="matches-list"></div>
            </section>

            <section id="messages-section" class="section">
                <h2>Messages</h2>
                <div id="conversations-list"></div>
                <div id="chat-container" class="hidden">
                    <div id="chat-header"></div>
                    <div id="chat-messages"></div>
                    <div id="message-input-container">
                        <input type="text" id="message-input" placeholder="Type a message...">
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
